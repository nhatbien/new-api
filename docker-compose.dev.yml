# Frontend Development - Backend built from local source
#
# Usage:
#   1. docker compose -f docker-compose.dev.yml up -d
#   2. cd web && bun install && bun run dev
#   3. Open http://localhost:3001 (Rsbuild dev server, API auto-proxied to :3000)
#
# External services:
#   Uses SQL_DSN and REDIS_CONN_STRING from .env by default, so it can connect
#   to your existing PostgreSQL/MySQL and Redis instances without creating
#   database/cache containers.
#   To run the bundled PostgreSQL container instead:
#     docker compose -f docker-compose.dev.yml --profile local-postgres up -d
#   and set SQL_DSN=postgresql://root:123456@postgres:5432/new-api in .env.
#   To run the bundled Redis container instead:
#     docker compose -f docker-compose.dev.yml --profile local-redis up -d
#   and set REDIS_CONN_STRING=redis://redis in .env.
#
# Rebuild backend after Go code changes:
#   docker compose -f docker-compose.dev.yml up -d --build new-api
#
# Stop:
#   docker compose -f docker-compose.dev.yml down
#
# Reset data:
#   docker compose -f docker-compose.dev.yml down -v

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: new-api-dev:local
    container_name: new-api-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - dev_data:/data
    environment:
      - SQL_DSN=${SQL_DSN:?Set SQL_DSN in .env}
      - REDIS_CONN_STRING=${REDIS_CONN_STRING:?Set REDIS_CONN_STRING in .env}
      - TZ=Asia/Shanghai
      - BATCH_UPDATE_ENABLED=true
    networks:
      - dev-network

  redis:
    image: redis:7-alpine
    container_name: new-api-dev-redis
    profiles:
      - local-redis
    restart: unless-stopped
    networks:
      - dev-network

  postgres:
    image: postgres:15-alpine
    container_name: new-api-dev-pg
    profiles:
      - local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - dev_pg_data:/var/lib/postgresql/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  dev_data:
  dev_pg_data:

networks:
  dev-network:
    driver: bridge
